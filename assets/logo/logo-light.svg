<svg width="240" height="60" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">

    <defs>

        <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">

            <stop offset="0%" stop-color="#00B8FF"/>

            <stop offset="100%" stop-color="#00E5FF"/>

        </linearGradient>

        <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">

            <stop offset="0%" stop-color="#00B8FF"/>

            <stop offset="100%" stop-color="#00E676"/>

        </linearGradient>

    </defs>

    <!-- Shield -->

    <path
        d="M30 5
           L48 12
           V28
           C48 41 40 50 30 55
           C20 50 12 41 12 28
           V12
           Z"
        fill="url(#shieldGradient)"
    />

    <!-- Lock -->

    <rect
        x="22"
        y="24"
        width="16"
        height="15"
        rx="3"
        fill="#FFFFFF"
    />

    <path
        d="M25 24
           V19
           C25 15 27.5 12.5 30 12.5
           C32.5 12.5 35 15 35 19
           V24"
        stroke="#FFFFFF"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"
    />

    <!-- Circuit Lines -->

    <line x1="8" y1="20" x2="14" y2="20"
          stroke="#00B8FF"
          stroke-width="2"/>

    <line x1="46" y1="20" x2="52" y2="20"
          stroke="#00B8FF"
          stroke-width="2"/>

    <line x1="8" y1="34" x2="14" y2="34"
          stroke="#00B8FF"
          stroke-width="2"/>

    <line x1="46" y1="34" x2="52" y2="34"
          stroke="#00B8FF"
          stroke-width="2"/>

    <circle cx="8" cy="20" r="2" fill="#00E676"/>
    <circle cx="52" cy="20" r="2" fill="#00E676"/>
    <circle cx="8" cy="34" r="2" fill="#00E676"/>
    <circle cx="52" cy="34" r="2" fill="#00E676"/>

    <!-- Brand -->

    <text
        x="70"
        y="30"
        font-size="24"
        font-family="Poppins, Arial, sans-serif"
        font-weight="700"
        fill="#111827">

        Cyber<tspan fill="url(#textGradient)">Hub</tspan>

    </text>

    <text
        x="70"
        y="48"
        font-size="11"
        font-family="Poppins, Arial, sans-serif"
        font-weight="500"
        letter-spacing="2"
        fill="#6B7280">

        BANGLADESH

    </text>

</svg>
