<svg width="240" height="60" viewBox="0 0 240 60" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">

      <stop offset="0%" stop-color="#00D4FF"></stop>

      <stop offset="100%" stop-color="#00FF9D"></stop>

    </linearGradient>

    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">

      <stop offset="0%" stop-color="#FFFFFF"></stop>

      <stop offset="60%" stop-color="#00D4FF"></stop>

      <stop offset="100%" stop-color="#00FF9D"></stop>

    </linearGradient>

    <filter id="glow">

      <feGaussianBlur stdDeviation="3" result="coloredBlur"></feGaussianBlur>

      <feMerge>

        <feMergeNode in="coloredBlur"></feMergeNode>

        <feMergeNode in="SourceGraphic"></feMergeNode>

      </feMerge>

    </filter>

  </defs>

  <!-- Shield -->

  <path d="M30 5
       L48 12
       V28
       C48 42 40 51 30 56
       C20 51 12 42 12 28
       V12Z" fill="url(#shield)" filter="url(#glow)"></path>

  <!-- Lock -->

  <rect x="22" y="24" width="16" height="15" rx="3" fill="#FFFFFF"></rect>

  <path d="M25 24V19
       C25 15.5 27.3 13 30 13
       C32.7 13 35 15.5 35 19V24" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"></path>

  <!-- Circuit -->

  <line x1="8" y1="20" x2="14" y2="20" stroke="#00D4FF" stroke-width="2"></line>

  <line x1="46" y1="20" x2="52" y2="20" stroke="#00D4FF" stroke-width="2"></line>

  <line x1="8" y1="34" x2="14" y2="34" stroke="#00D4FF" stroke-width="2"></line>

  <line x1="46" y1="34" x2="52" y2="34" stroke="#00D4FF" stroke-width="2"></line>

  <circle cx="8" cy="20" r="2" fill="#00FF9D"></circle>

  <circle cx="52" cy="20" r="2" fill="#00FF9D"></circle>

  <circle cx="8" cy="34" r="2" fill="#00FF9D"></circle>

  <circle cx="52" cy="34" r="2" fill="#00FF9D"></circle>

  <!-- Brand -->

  <text x="70" y="30" font-size="24" font-family="Poppins,Segoe UI,Arial,sans-serif" font-weight="700" fill="url(#textGradient)">

      CyberHub

  </text>

  <text x="70" y="48" font-size="11" font-family="Poppins,Segoe UI,Arial,sans-serif" font-weight="500" letter-spacing="2" fill="#B6C2CF">

      BANGLADESH

  </text>

</svg>